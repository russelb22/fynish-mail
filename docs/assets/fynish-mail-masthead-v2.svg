  <rect width="1200" height="316" fill="#fffcf7"/>

  <g transform="translate(22 18)">
    <rect width="284" height="266" rx="34" fill="#ffffff"/>
    <text x="18" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="224" font-weight="700" fill="#0b3d6d">F</text>
    <text x="140" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="224" font-weight="700" fill="#ff5a1f">y</text>
