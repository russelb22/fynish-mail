services:
  postgres:
    image: postgres:16
    container_name: fynish-postgres
    environment:
      POSTGRES_USER: fynish_app
      POSTGRES_PASSWORD: fynish_password
      POSTGRES_DB: fynish
    ports:
      - "5432:5432"
    volumes:
      - fynish_postgres_data:/var/lib/postgresql/data
      - ./backend/app/db:/bootstrap:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fynish_app -d fynish"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  fynish_postgres_data:
